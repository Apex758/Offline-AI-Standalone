<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>OECS Photo Transfer</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: #eff6ff;
    --primary-border: #bfdbfe;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --success-border: #bbf7d0;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --danger-border: #fecaca;

    --bg: #f8fafc;
    --bg-card: #ffffff;
    --bg-elevated: #f1f5f9;
    --border: #e2e8f0;
    --border-light: #f1f5f9;

    --text: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --radius: 12px;
    --radius-sm: 8px;
  }

  html.dark {
    --primary: #3b82f6;
    --primary-hover: #60a5fa;
    --primary-light: #1e293b;
    --primary-border: #1e40af;
    --success: #22c55e;
    --success-light: #0f2418;
    --success-border: #14532d;
    --danger: #f87171;
    --danger-light: #2d1214;
    --danger-border: #7f1d1d;

    --bg: #0f172a;
    --bg-card: #1e293b;
    --bg-elevated: #334155;
    --border: #334155;
    --border-light: #1e293b;

    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: var(--shadow-sm);
  }
  .header-logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .header-text { flex: 1; min-width: 0; }
  .header-text h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .header-text .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* ── Status pill ── */
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .status-pill.connected {
    background: var(--success-light);
    color: var(--success);
    border: 1px solid var(--success-border);
  }
  .status-pill.disconnected {
    background: var(--danger-light);
    color: var(--danger);
    border: 1px solid var(--danger-border);
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title svg { opacity: 0.6; }

  /* ── Form inputs ── */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-group .hint {
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-muted);
    font-size: 11px;
  }
  input[type="text"], select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  html.dark input[type="text"]:focus, html.dark select:focus {
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
  }

  /* ── Buttons ── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  .btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: 0 1px 2px rgba(37,99,235,0.3);
  }
  .btn-primary:hover { background: var(--primary-hover); }

  .btn-success {
    background: var(--success);
    color: white;
    box-shadow: 0 1px 2px rgba(22,163,74,0.3);
  }

  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--primary);
  }

  /* ── Capture button ── */
  .capture-btn {
    padding: 22px;
    font-size: 18px;
    border-radius: 16px;
    min-height: 72px;
    background: linear-gradient(135deg, var(--primary), #7c3aed);
    box-shadow: 0 4px 14px rgba(37,99,235,0.3);
  }
  .capture-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(37,99,235,0.2); }

  /* ── Hidden file input ── */
  #camera-input { display: none; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: var(--shadow-md);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--success); color: white; }
  .toast.error { background: var(--danger); color: white; }

  /* ── Preview ── */
  .preview-area {
    display: none;
    margin-top: 12px;
    text-align: center;
  }
  .preview-area img {
    max-width: 100%;
    max-height: 220px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
  }
  .preview-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .preview-actions .btn { flex: 1; padding: 12px; font-size: 14px; }

  /* ── Upload indicator ── */
  .upload-indicator {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; flex: 1; }

  /* ── Toggle switch ── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-row input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  /* ── Photo Gallery ── */
  .gallery-section { margin-top: 4px; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .gallery-thumb {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
    aspect-ratio: 1;
    background: var(--bg-elevated);
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .gallery-thumb:active { border-color: var(--primary); }
  .gallery-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gallery-thumb .thumb-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 3px 6px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Photo lightbox ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: var(--radius);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .lightbox-info {
    margin-top: 14px;
    text-align: center;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
  }
  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Counter badge ── */
  .counter-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    padding: 0 7px;
    border-radius: 11px;
    background: var(--primary);
    color: white;
    font-size: 12px;
    font-weight: 700;
    margin-left: auto;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 28px 16px;
    color: var(--text-muted);
  }
  .empty-state svg { margin-bottom: 10px; opacity: 0.4; }
  .empty-state p { font-size: 13px; line-height: 1.5; }

  /* ── Session setup welcome ── */
  .setup-welcome {
    text-align: center;
    padding: 20px 0 8px;
  }
  .setup-welcome .logo-large {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-md);
  }
  .setup-welcome h2 {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }
  .setup-welcome p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" id="header-logo" src="/api/photo-transfer/logo" alt="OECS">
  <div class="header-text">
    <h1>OECS Photo Transfer</h1>
    <div class="subtitle" id="session-label">Not connected</div>
  </div>
  <div class="status-pill connected" id="status-pill" style="display:none">
    <span class="dot"></span>
    <span id="status-text">Connected</span>
  </div>
</div>

<!-- ═══ Screen 1: Session Setup ═══ -->
<div class="screen active" id="screen-setup">
  <div class="content">
    <div class="setup-welcome">
      <img class="logo-large" src="/api/photo-transfer/logo" alt="OECS">
      <h2>Photo Transfer</h2>
      <p>Capture student worksheets and send them directly to your PC</p>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Start a Session
      </div>
      <div class="input-group">
        <label for="class-name">Session Name</label>
        <input type="text" id="class-name" placeholder="e.g. Mrs. Johnson - Math" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="btn-start-session">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        Start Capturing
      </button>
    </div>
  </div>
</div>

<!-- ═══ Screen 2: Capture ═══ -->
<div class="screen" id="screen-capture">
  <div class="content">
    <!-- Capture options -->
    <div class="card">
      <label class="toggle-row">
        <input type="checkbox" id="rapid-capture">
        <span>Rapid Capture <span style="color:var(--text-muted);font-size:11px">&mdash; auto-send &amp; reopen camera</span></span>
      </label>
    </div>

    <!-- Capture button -->
    <button class="btn capture-btn" id="btn-capture">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Take Photo
    </button>

    <input type="file" id="camera-input" accept="image/*" capture="environment">

    <!-- Preview area -->
    <div class="preview-area" id="preview-area">
      <img id="preview-img" alt="Preview">
      <div class="preview-actions">
        <button class="btn btn-outline" id="btn-retake">Retake</button>
        <button class="btn btn-primary" id="btn-send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Send
        </button>
      </div>
    </div>

    <!-- Upload indicator -->
    <div class="upload-indicator" id="upload-indicator">
      <div class="spinner"></div>
      Sending photo&hellip;
    </div>

    <!-- Sent photos gallery -->
    <div class="card gallery-section" id="gallery-card" style="display:none">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Sent Photos
        <span class="counter-badge" id="photo-count-badge">0</span>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </div>
  </div>
</div>

<!-- ═══ Lightbox ═══ -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <img id="lightbox-img" alt="Photo">
  <div class="lightbox-info" id="lightbox-info"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  // ── Theme ──
  const params = new URLSearchParams(window.location.search);
  const initialTheme = params.get('theme');
  if (initialTheme === 'dark') {
    document.documentElement.classList.add('dark');
  }

  // Poll theme from backend every 10s (catches live changes from laptop)
  async function syncTheme() {
    try {
      const res = await fetch(BASE_URL + '/api/photo-transfer/theme');
      const data = await res.json();
      if (data.theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch (e) {}
  }

  // ── State ──
  let sessionId = null;
  let photoCount = 0;
  let currentFile = null;
  const BASE_URL = window.location.origin;
  const sentPhotos = []; // {url, name, time}

  // ── Connection check on load ──
  (async function checkConnection() {
    try {
      const res = await fetch(BASE_URL + '/api/photo-transfer/network-info');
      if (res.ok) {
        document.getElementById('session-label').textContent = 'Connected to PC';
      }
    } catch (e) {
      document.getElementById('session-label').textContent = 'Cannot reach PC';
    }
  })();

  // Start theme polling
  setInterval(syncTheme, 10000);

  // ── DOM refs ──
  const $ = id => document.getElementById(id);
  const $setup     = $('screen-setup');
  const $capture   = $('screen-capture');
  const $className = $('class-name');
  const $btnStart  = $('btn-start-session');
  const $btnCapture = $('btn-capture');
  const $cameraInput = $('camera-input');
  const $previewArea = $('preview-area');
  const $previewImg  = $('preview-img');
  const $btnRetake  = $('btn-retake');
  const $btnSend    = $('btn-send');
  const $uploadInd  = $('upload-indicator');
  const $sessionLabel = $('session-label');
  const $galleryCard = $('gallery-card');
  const $galleryGrid = $('gallery-grid');
  const $countBadge = $('photo-count-badge');
  const $statusPill = $('status-pill');

  // ── Screens ──
  function showScreen(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  // ── Toast ──
  function toast(msg, type) {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type || '');
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  // ── Gallery ──
  function addToGallery(photoData) {
    const entry = {
      url: BASE_URL + '/api/photo-transfer/photos/' + sessionId + '/' + photoData.filename,
      name: photoData.filename,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    };
    sentPhotos.unshift(entry);

    $galleryCard.style.display = 'block';
    $countBadge.textContent = sentPhotos.length;

    // Rebuild grid (newest first)
    $galleryGrid.innerHTML = '';
    sentPhotos.forEach(function(p, i) {
      const div = document.createElement('div');
      div.className = 'gallery-thumb';
      div.innerHTML = '<img src="' + p.url + '" alt="' + p.name + '" loading="lazy">' +
        '<div class="thumb-label">Photo ' + (sentPhotos.length - i) + '</div>';
      div.addEventListener('click', function() { openLightbox(p); });
      $galleryGrid.appendChild(div);
    });
  }

  // ── Lightbox ──
  function openLightbox(photo) {
    $('lightbox').classList.add('active');
    $('lightbox-img').src = photo.url;
    $('lightbox-info').textContent = photo.name + '  •  ' + photo.time;
  }
  $('lightbox-close').addEventListener('click', function() {
    $('lightbox').classList.remove('active');
  });
  $('lightbox').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });

  // ── Start Session ──
  $btnStart.addEventListener('click', async () => {
    const className = $className.value.trim() || 'Unnamed Session';
    $btnStart.disabled = true;
    $btnStart.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0"></div> Starting...';

    try {
      const res = await fetch(BASE_URL + '/api/photo-transfer/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_name: className }),
      });
      const data = await res.json();
      sessionId = data.id;
      $sessionLabel.textContent = className;
      $statusPill.style.display = 'flex';
      showScreen($capture);
      toast('Session started!', 'success');
    } catch (e) {
      toast('Could not connect to PC', 'error');
      $btnStart.disabled = false;
      $btnStart.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg> Start Capturing';
    }
  });

  // ── Capture ──
  $btnCapture.addEventListener('click', () => {
    $cameraInput.value = '';
    $cameraInput.click();
  });

  $cameraInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    currentFile = file;

    if ($('rapid-capture').checked) {
      sendPhoto(file);
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => {
      $previewImg.src = ev.target.result;
      $previewArea.style.display = 'block';
      $btnCapture.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // ── Retake ──
  $btnRetake.addEventListener('click', () => {
    currentFile = null;
    $previewArea.style.display = 'none';
    $btnCapture.style.display = 'flex';
  });

  // ── Send ──
  async function sendPhoto(file) {
    if (!file || !sessionId) return;

    $previewArea.style.display = 'none';
    $uploadInd.style.display = 'block';
    $btnCapture.style.display = 'none';

    const formData = new FormData();
    formData.append('file', file);
    formData.append('session_id', sessionId);

    try {
      const res = await fetch(BASE_URL + '/api/photo-transfer/upload', {
        method: 'POST',
        body: formData,
      });
      const data = await res.json();

      photoCount = data.total_count;
      addToGallery(data.photo);
      currentFile = null;
      toast('Photo ' + photoCount + ' sent!', 'success');
    } catch (e) {
      toast('Upload failed — retrying...', 'error');
      setTimeout(async function() {
        try {
          const retryData = new FormData();
          retryData.append('file', file);
          retryData.append('session_id', sessionId);
          const res2 = await fetch(BASE_URL + '/api/photo-transfer/upload', { method: 'POST', body: retryData });
          const data2 = await res2.json();
          photoCount = data2.total_count;
          addToGallery(data2.photo);
          currentFile = null;
          toast('Photo ' + photoCount + ' sent on retry!', 'success');
        } catch (e2) {
          toast('Upload failed — check connection', 'error');
          $previewImg.src = URL.createObjectURL(file);
          $previewArea.style.display = 'block';
        }
        $uploadInd.style.display = 'none';
        $btnCapture.style.display = 'flex';
      }, 2000);
      return;
    }

    $uploadInd.style.display = 'none';
    $btnCapture.style.display = 'flex';

    // Rapid Capture: auto-reopen camera after successful upload
    if ($('rapid-capture').checked) {
      setTimeout(function() {
        $cameraInput.value = '';
        $cameraInput.click();
      }, 400);
    }
  }

  $btnSend.addEventListener('click', () => sendPhoto(currentFile));

  // ── Connection health monitor ──
  let connectionOk = true;
  setInterval(async function() {
    try {
      const res = await fetch(BASE_URL + '/api/photo-transfer/network-info', { signal: AbortSignal.timeout(3000) });
      if (res.ok && !connectionOk) {
        connectionOk = true;
        $statusPill.className = 'status-pill connected';
        $('status-text').textContent = 'Connected';
        toast('Reconnected!', 'success');
      }
      connectionOk = true;
    } catch {
      if (connectionOk) {
        connectionOk = false;
        $statusPill.className = 'status-pill disconnected';
        $('status-text').textContent = 'Offline';
      }
    }
  }, 5000);

  // ── Auto-focus ──
  setTimeout(() => $className.focus(), 300);

})();
</script>
</body>
</html>
